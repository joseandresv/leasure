{% extends "base.html" %}
{% block title %}leasure - spotify{% endblock %}
{% block content %}
<h2>spotify</h2>
<div id="spotify-status" hx-get="/api/spotify/status/html" hx-trigger="load" hx-swap="innerHTML">
    checking...
</div>

<div x-data="{ tab: 'albums' }">
    <div class="tab-nav">
        <a href="#" @click.prevent="tab = 'albums'" :class="tab === 'albums' && 'tab-active'">albums</a>
        <a href="#" @click.prevent="tab = 'playlists'" :class="tab === 'playlists' && 'tab-active'">playlists</a>
        <a href="#" @click.prevent="tab = 'liked'" :class="tab === 'liked' && 'tab-active'">liked</a>
    </div>

    <div x-show="tab === 'albums'">
        <div hx-get="/api/spotify/albums/html" hx-trigger="load" hx-swap="innerHTML" id="spotify-albums-content">
            <i style="color: var(--text-muted);">loading albums...</i>
        </div>
    </div>

    <div x-show="tab === 'playlists'" x-cloak>
        <div hx-get="/api/spotify/playlists/html" hx-trigger="intersect once" hx-swap="innerHTML" id="spotify-playlists-content">
            <i style="color: var(--text-muted);">loading playlists...</i>
        </div>
    </div>

    <div x-show="tab === 'liked'" x-cloak>
        <div hx-get="/api/spotify/liked/html" hx-trigger="intersect once" hx-swap="innerHTML" id="spotify-liked-content">
            <i style="color: var(--text-muted);">loading liked songs...</i>
        </div>
    </div>
</div>

{% from "macros/components.html" import modal %}
{{ modal('album-modal') }}
{% endblock %}
