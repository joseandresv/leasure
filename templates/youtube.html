{% extends "base.html" %}
{% block title %}leasure - youtube music{% endblock %}
{% block content %}
<h2>youtube music</h2>
<div id="yt-status" hx-get="/api/youtube/status/html" hx-trigger="load" hx-swap="innerHTML">
    checking...
</div>

<div x-data="{ tab: 'playlists' }">
    <div style="margin: 0.5rem 0;">
        [<a href="#" @click.prevent="tab = 'playlists'" :style="tab === 'playlists' && 'font-weight:bold'">playlists</a>]
        [<a href="#" @click.prevent="tab = 'albums'" :style="tab === 'albums' && 'font-weight:bold'">albums</a>]
        [<a href="#" @click.prevent="tab = 'liked'" :style="tab === 'liked' && 'font-weight:bold'">liked</a>]
    </div>

    <div x-show="tab === 'playlists'" id="yt-playlists">
        <div hx-get="/api/youtube/playlists/html" hx-trigger="load" hx-swap="innerHTML">
            <i>loading playlists...</i>
        </div>
    </div>

    <div x-show="tab === 'albums'" id="yt-albums">
        <div hx-get="/api/youtube/albums/html" hx-trigger="intersect once" hx-swap="innerHTML">
            <i>loading albums...</i>
        </div>
    </div>

    <div x-show="tab === 'liked'" id="yt-liked">
        <div hx-get="/api/youtube/liked/html" hx-trigger="intersect once" hx-swap="innerHTML">
            <i>loading liked songs...</i>
        </div>
    </div>
</div>

<dialog id="yt-modal">
    <header>
        <span>details</span>
        <button onclick="this.closest('dialog').close()">&times;</button>
    </header>
    <div id="yt-detail" style="padding: 1rem; overflow-y: auto; max-height: calc(85vh - 3rem);">
    </div>
</dialog>
{% endblock %}
