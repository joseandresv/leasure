{% if connected %}
<p><mark>Connected</mark> as <strong>{{ user }}</strong></p>
{% elif auth_url %}
<p>Not connected. <a href="{{ auth_url }}">Connect Spotify</a></p>
{% else %}
<p style="color: var(--text-muted);">Spotify credentials not configured. Add SPOTIFY_CLIENT_ID and SPOTIFY_CLIENT_SECRET to .env</p>
{% endif %}
