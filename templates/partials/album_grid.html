<div class="album-grid">
{% for album in albums %}
<div class="album-card"
     hx-get="/api/spotify/albums/{{ album.id }}/html"
     hx-target="#album-detail"
     hx-swap="innerHTML"
     onclick="document.getElementById('album-modal').showModal()">
    <img src="{{ album.image_url or '/static/img/placeholder.svg' }}" alt="{{ album.name }}" loading="lazy">
    <h4>{{ album.name }}</h4>
    <p>{{ album.artist }}</p>
    {% if album.downloaded_count > 0 %}
    <span class="badge badge-done">{{ album.downloaded_count }}/{{ album.total_tracks }}</span>
    {% endif %}
</div>
{% endfor %}
</div>

{% if total > offset + limit %}
<button hx-get="/api/spotify/albums/html?offset={{ offset + limit }}&limit={{ limit }}"
        hx-target="this"
        hx-swap="outerHTML"
        class="outline">
    Load more ({{ offset + limit }} of {{ total }})
</button>
{% endif %}
